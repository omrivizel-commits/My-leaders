<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="גלו מי שכיהן בישראל מאז שנולדתם. קלעו תאריך לידה וראו את כל ראשי הממשלה, הרמטכ"לים והנשיאים בסדר כרונולוגי עם פרטים מלאים.">
<meta name="keywords" content="ישראל, ראש ממשלה, רמטכ"ל, נשיא, היסטוריה, מנהיגים, קלנדר, לידה">
<meta name="author" content="המנהיגים של חיי">
<meta property="og:title" content="המנהיגים של חיי — מי הנהיג מאז שנולדת?">
<meta property="og:description" content="גלה מי הנהיג בישראל מאז שנולדת - ראשי ממשלה, רמטכ"לים, ונשיאים בסדר כרונולוגי.">
<meta name="robots" content="index, follow">
<title>המנהיגים של חיי — מי הנהיג מאז שנולדת?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#eef2ff; --bg2:#f8fafc; --ink:#0f172a; --muted:#64748b;
    --card:#ffffff; --line:#e2e8f0; --accent:#2563eb; --accent-soft:#dbeafe;
    --pm:#2563eb; --cos:#15803d; --pres:#b45309; --live:#16a34a;
    --shadow:0 10px 30px -12px rgba(15,23,42,.25);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Rubik',system-ui,-apple-system,'Segoe UI',Arial,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 600px at 100% -10%, #e0e7ff 0%, transparent 60%),
      linear-gradient(180deg,var(--bg1),var(--bg2));
    min-height:100vh;
    line-height:1.5;
  }
  .wrap{max-width:880px;margin:0 auto;padding:28px 18px 64px}

  /* ---------- Header / form ---------- */
  header.hero{text-align:center;padding:18px 6px 6px}
  .hero h1{font-size:clamp(26px,5vw,40px);font-weight:800;margin:0 0 8px;letter-spacing:-.5px}
  .hero p{color:var(--muted);font-size:clamp(15px,2.5vw,18px);margin:0 auto;max-width:560px}
  .panel{
    background:var(--card);border:1px solid var(--line);border-radius:20px;
    box-shadow:var(--shadow);padding:20px;margin:24px auto 8px;max-width:560px;
  }
  .field{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:center}
  label{font-weight:600;font-size:16px}
  input[type=date]{
    font-family:inherit;font-size:17px;padding:12px 14px;border-radius:12px;
    border:1.5px solid var(--line);background:#fff;color:var(--ink);min-width:190px;
  }
  input[type=date]::placeholder{color:var(--muted)}
  input[type=date]:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
  button{
    font-family:inherit;font-size:17px;font-weight:700;color:#fff;cursor:pointer;
    background:var(--accent);border:none;padding:12px 26px;border-radius:12px;
    transition:transform .06s ease, background .15s ease;
  }
  button:hover{background:#1d4ed8}
  button:active{transform:translateY(1px)}
  .err{color:#dc2626;font-size:14px;text-align:center;margin-top:10px;min-height:18px;font-weight:500}

  /* ---------- Summary stat box ---------- */
  .summary-box{max-width:680px;margin:22px auto 6px}
  .summary-box .intro{text-align:center;font-size:16px;font-weight:600;margin-bottom:12px}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .stat{
    background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:14px 6px;text-align:center;box-shadow:0 4px 14px -10px rgba(15,23,42,.3);
  }
  .stat .num{font-size:27px;font-weight:800;line-height:1.1;color:var(--accent)}
  .stat .lbl{font-size:12px;color:var(--muted);font-weight:600;margin-top:4px}
  @media(max-width:560px){ .stats{grid-template-columns:repeat(2,1fr)} }

  /* ---------- Mobile ---------- */
  @media(max-width:480px){
    .wrap{padding:14px 10px 48px}
    .hero{padding:10px 4px 4px}
    .hero h1{font-size:24px;margin-bottom:6px}
    .hero p{font-size:14px}
    .panel{padding:14px 12px;margin:14px auto 6px;border-radius:16px}
    .field{flex-direction:column;gap:8px;align-items:stretch}
    input[type=date]{width:100%;min-width:unset;font-size:16px;padding:11px 12px}
    button{width:100%;font-size:16px;padding:11px}
    .summary-box{margin:14px auto 4px}
    .stats{grid-template-columns:repeat(2,1fr);gap:8px}
    .stat{padding:11px 4px;border-radius:13px}
    .stat .num{font-size:22px}
    .stat .lbl{font-size:11px}
    .highlight-box{margin:10px auto 4px;padding:12px 12px;border-radius:14px}
    .hl-stats{gap:7px}
    .hl-stat{min-width:0;flex:1 1 calc(50% - 4px);padding:8px 6px}
    .hl-stat b{font-size:18px}
    .tabs{gap:6px;margin:18px auto 4px}
    .tab{font-size:13px;padding:8px 12px}
    .tab .tcount{font-size:11px;padding:1px 6px}
    section.block{margin-top:14px}
    .block-head h2{font-size:18px}
    .block-head .ic{font-size:20px}
    .card{padding:10px 10px;gap:10px;border-radius:13px}
    .avatar{width:52px;height:52px;font-size:15px}
    .avatar img{object-position:center 15%}
    .info .name{font-size:15px;gap:6px}
    .info .meta,.info .term{font-size:12px}
    .info .age{font-size:11px}
    .info .pct-bar{max-width:110px}
    .info .pct-label{font-size:12px}
    .card .go{font-size:18px}
    .timeline::before{inset-inline-start:25px}
    .modal-overlay{padding:0;align-items:flex-end}
    .modal{border-radius:20px 20px 0 0;max-height:92vh;max-width:100%}
    .modal-top{padding:16px 14px 12px;gap:12px}
    .modal-photo{width:72px!important;height:72px!important;font-size:22px!important}
    .modal-name{font-size:19px}
    .modal-role{font-size:13px}
    .modal-close{top:12px;left:12px;width:30px;height:30px;font-size:18px}
    .modal-body{padding:12px 14px 24px}
    .modal-bio{font-size:14.5px;line-height:1.75}
    .fact{font-size:12px;padding:4px 9px}
    .dark-btn{top:10px;right:10px;width:36px;height:36px;font-size:17px}
    .compare-grid{grid-template-columns:1fr}
    .vtl-wrap,.events-wrap{border-radius:14px;padding:12px 10px}
    .compare-panel{padding:12px 12px}
    .share-row{gap:6px}
    .share-btn{font-size:12px;padding:7px 12px}
  }

  /* ---------- Dark mode ---------- */
  [data-theme=dark]{
    --bg1:#0d1117;--bg2:#0d1117;--ink:#e2e8f0;--muted:#8b949e;
    --card:#161b22;--line:#30363d;--accent:#79c0ff;--accent-soft:#1f2937;
    --pm:#79c0ff;--cos:#56d364;--pres:#d29922;--live:#56d364;
    --shadow:0 10px 30px -12px rgba(0,0,0,.8);
  }
  [data-theme=dark] body{background:#0d1117}
  [data-theme=dark] .note{background:#161b22;border-color:#30363d}
  [data-theme=dark] input{background:var(--card)!important;color:var(--ink)!important;color-scheme:dark}
  [data-theme=dark] .hl-stat{background:#1c2128}
  [data-theme=dark] .modal-close{background:#1c2128}
  [data-theme=dark] .compare-col,[data-theme=dark] .event-item{background:#1c2128}
  .dark-btn{
    position:fixed;top:14px;right:14px;z-index:40;width:42px;height:42px;font-size:20px;
    background:var(--card);border:1.5px solid var(--line);border-radius:50%;cursor:pointer;
    display:grid;place-items:center;transition:background .2s,border-color .2s;box-shadow:var(--shadow);
  }

  /* ---------- Card entry animation ---------- */
  @keyframes cardIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .card{animation:cardIn .32s ease both;animation-delay:calc(var(--ci,0)*60ms)}

  /* ---------- Search ---------- */
  .search-wrap{max-width:680px;margin:10px auto 0}
  .search-input{
    width:100%;font-family:inherit;font-size:15px;padding:10px 16px;border-radius:12px;
    border:1.5px solid var(--line);background:var(--card);color:var(--ink);
  }
  .search-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
  .search-empty{text-align:center;color:var(--muted);padding:20px;font-size:14px;display:none}

  /* ---------- Share ---------- */
  .share-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
  .share-btn{
    display:inline-flex;align-items:center;gap:6px;
    font-family:inherit;font-size:13px;font-weight:700;color:#fff;cursor:pointer;
    border:none;padding:8px 16px;border-radius:10px;transition:opacity .15s;
  }
  .share-btn:hover{opacity:.85}
  .share-btn.wa{background:#25D366}
  .share-btn.cp{background:var(--muted)}

  /* ---------- Compare ---------- */
  .compare-toggle{
    max-width:560px;margin:8px auto 0;display:block;width:100%;
    font-family:inherit;font-size:14px;font-weight:600;
    color:var(--accent);background:transparent;border:1.5px solid var(--accent);
    border-radius:12px;padding:9px;cursor:pointer;
    transition:background .15s,color .15s;
  }
  .compare-toggle:hover{background:var(--accent);color:#fff}
  .compare-panel{
    max-width:560px;margin:8px auto 0;background:var(--card);
    border:1.5px dashed var(--accent);border-radius:16px;padding:16px 18px;
  }
  .compare-panel .cp-title{font-weight:800;font-size:15px;margin:0 0 12px;text-align:center}
  .compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  .compare-col{background:var(--bg1);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center}
  .compare-col .cc-label{font-size:11px;color:var(--muted);font-weight:700;margin-bottom:6px}
  .compare-col .cc-age{font-size:26px;font-weight:800;color:var(--accent);line-height:1}
  .compare-col .cc-sub{font-size:10px;color:var(--muted);margin-bottom:8px}
  .cc-stat-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid var(--line)}
  .cc-stat-row:last-child{border-bottom:none}
  .cc-stat-key{color:var(--muted);font-weight:600}
  .cc-stat-val{font-weight:800}

  /* ---------- Wars / Events ---------- */
  .events-wrap{max-width:880px;margin:20px auto 0;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px 18px}
  .events-wrap h3{font-size:16px;font-weight:800;margin:0 0 12px;text-align:center}
  .event-list{display:flex;flex-direction:column;gap:8px}
  .event-item{display:flex;align-items:flex-start;gap:12px;padding:10px 12px;background:var(--bg1);border:1px solid var(--line);border-radius:12px}
  .event-icon{font-size:20px;flex:0 0 auto;line-height:1;margin-top:1px}
  .event-body{flex:1 1 auto;min-width:0}
  .event-year{font-size:11px;font-weight:700;color:var(--muted)}
  .event-name{font-size:15px;font-weight:700}
  .event-desc{font-size:13px;color:var(--muted);margin-top:2px}

  /* ---------- Highlights box (personal summary) ---------- */
  .highlight-box{
    max-width:680px;margin:16px auto 6px;background:var(--card);border:1px solid var(--line);
    border-radius:18px;box-shadow:var(--shadow);padding:16px 18px;
  }
  .highlight-box h3{margin:0 0 8px;font-size:16px;font-weight:800;text-align:center}
  .hl-row{display:flex;align-items:center;gap:11px;padding:10px 2px;border-bottom:1px solid var(--line)}
  .hl-ic{font-size:21px;flex:0 0 auto;line-height:1}
  .hl-main{flex:1 1 auto;min-width:0}
  .hl-label{font-size:12.5px;color:var(--muted);font-weight:600}
  .hl-name{font-size:16px;font-weight:700;margin-top:1px}
  .hl-pct{flex:0 0 auto;font-size:15px;font-weight:800;color:var(--accent);white-space:nowrap}
  .hl-stats{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px dashed var(--line)}
  .hl-stat{
    flex:1 1 0;min-width:130px;background:var(--bg1);border:1px solid var(--line);border-radius:12px;
    padding:10px;text-align:center;font-size:12.5px;color:var(--muted);font-weight:600;
  }
  .hl-stat b{display:block;font-size:22px;color:var(--ink);font-weight:800;line-height:1.1;margin-bottom:2px}

  /* ---------- Tabs ---------- */
  .tabs{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:28px auto 4px;max-width:680px}
  .tab{
    font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;
    background:var(--card);color:var(--ink);border:1.5px solid var(--line);
    padding:9px 16px;border-radius:999px;display:flex;align-items:center;gap:7px;
    transition:border-color .15s ease, background .15s ease, color .15s ease;
  }
  .tab:hover{border-color:var(--accent)}
  .tab .tcount{font-size:12px;background:var(--line);color:var(--muted);border-radius:999px;padding:1px 8px;font-weight:700}
  .tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .tab.active .tcount{background:rgba(255,255,255,.25);color:#fff}

  .note{
    text-align:center;max-width:620px;margin:8px auto 0;color:var(--muted);
    font-size:14px;background:#fff7ed;border:1px solid #fed7aa;border-radius:12px;padding:8px 12px;
  }

  /* ---------- Sections ---------- */
  section.block{margin-top:34px}
  .block-head{display:flex;align-items:center;gap:10px;margin:0 2px 14px}
  .block-head .ic{font-size:24px;line-height:1}
  .block-head h2{font-size:22px;font-weight:800;margin:0}
  .block-head .count{
    margin-inline-start:auto;font-size:13px;font-weight:600;color:#fff;
    padding:3px 11px;border-radius:999px;
  }
  .block.pm   .count{background:var(--pm)}
  .block.cos  .count{background:var(--cos)}
  .block.pres .count{background:var(--pres)}
  .block.pm   .accent{color:var(--pm)}
  .block.cos  .accent{color:var(--cos)}
  .block.pres .accent{color:var(--pres)}

  /* timeline list */
  .timeline{position:relative;margin:0;padding:0;list-style:none}
  .timeline::before{
    content:"";position:absolute;inset-inline-start:31px;top:8px;bottom:8px;width:2px;
    background:var(--line);
  }
  .card{
    position:relative;display:flex;gap:14px;align-items:center;cursor:pointer;
    background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:12px 14px;margin:0 0 12px;box-shadow:0 4px 14px -10px rgba(15,23,42,.3);
    transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
  }
  .card:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--accent)}
  .card:focus-visible{outline:3px solid var(--accent-soft);outline-offset:2px}
  .card .go{
    flex:0 0 auto;font-size:22px;line-height:1;color:var(--muted);opacity:.45;
    transition:opacity .12s ease, transform .12s ease;align-self:center;
  }
  .card:hover .go{opacity:1;color:var(--accent);transform:translateX(-3px)}
  .card.live{border-color:var(--live);box-shadow:0 0 0 3px rgba(22,163,74,.12)}

  .avatar{
    position:relative;flex:0 0 auto;width:64px;height:64px;border-radius:50%;
    background:linear-gradient(135deg,#cbd5e1,#94a3b8);
    display:grid;place-items:center;color:#fff;font-weight:700;font-size:20px;
    overflow:hidden;border:2px solid #fff;box-shadow:0 0 0 1px var(--line);
  }
  .avatar::after{content:attr(data-initials)}
  .avatar img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 18%}

  .info{flex:1 1 auto;min-width:0}
  .info .name{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .badge-live{
    font-size:11px;font-weight:700;color:#fff;background:var(--live);
    padding:2px 9px;border-radius:999px;white-space:nowrap;
  }
  .info .meta{font-size:14px;color:var(--muted);font-weight:600;margin-top:1px}
  .info .term{font-size:14px;color:var(--ink);margin-top:3px;font-weight:500}
  .info .age{font-size:13px;color:var(--muted);margin-top:1px}
  .info .pct{margin-top:8px;display:flex;align-items:center;gap:8px}
  .info .pct-bar{flex:1 1 auto;height:7px;background:var(--line);border-radius:999px;overflow:hidden;max-width:170px}
  .info .pct-bar span{display:block;height:100%;border-radius:999px}
  .block.pm   .pct-bar span{background:var(--pm)}
  .block.cos  .pct-bar span{background:var(--cos)}
  .block.pres .pct-bar span{background:var(--pres)}
  .info .pct-label{font-size:13px;color:var(--ink);font-weight:600;white-space:nowrap}
  .info .pct-label b{font-size:14px}
  section.block{margin-top:18px}

  footer{display:none}

  /* ---------- Modal / profile ---------- */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(15,23,42,.62);backdrop-filter:blur(3px);
    display:flex;align-items:center;justify-content:center;padding:18px;z-index:50;
    opacity:0;transition:opacity .2s ease;
  }
  .modal-overlay.show{opacity:1}
  .modal{
    background:var(--card);border-radius:22px;max-width:560px;width:100%;
    max-height:88vh;overflow-y:auto;box-shadow:0 30px 70px -20px rgba(0,0,0,.55);
    transform:translateY(14px) scale(.97);transition:transform .22s ease;
  }
  .modal-overlay.show .modal{transform:none}
  .modal-top{display:flex;gap:16px;align-items:center;padding:24px 24px 18px;border-bottom:1px solid var(--line);position:relative}
  .modal-photo{width:92px!important;height:92px!important;font-size:28px!important;flex:0 0 auto}
  .modal-name{font-size:23px;font-weight:800;line-height:1.2}
  .modal-role{color:var(--accent);font-weight:700;font-size:15px;margin-top:4px}
  .modal-close{
    position:absolute;top:14px;left:16px;width:34px;height:34px;border-radius:50%;
    border:none;background:var(--bg1);color:var(--muted);font-size:22px;line-height:1;cursor:pointer;
    display:grid;place-items:center;transition:background .15s ease,color .15s ease;
  }
  .modal-close:hover{background:#fee2e2;color:#dc2626}
  .modal-body{padding:18px 24px 24px}
  .modal-facts{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .fact{background:var(--bg1);border:1px solid var(--line);border-radius:10px;padding:5px 11px;font-size:13px;font-weight:600;color:var(--ink)}
  .modal-bio{font-size:15.5px;line-height:1.85;color:var(--ink);white-space:pre-line}
  .sources{margin-top:18px;border-top:1px dashed var(--line);padding-top:14px}
  .sources h4{margin:0 0 9px;font-size:14px;color:var(--ink)}
  .sources ul{margin:0;padding-inline-start:18px;display:flex;flex-direction:column;gap:5px}
  .sources a{color:var(--accent);font-size:13.5px;text-decoration:none}
  .sources a:hover{text-decoration:underline}

  .hidden{display:none}
</style>
</head>
<body>
<button class="dark-btn" id="darkBtn" aria-label="החלף מצב תצוגה">🌙</button>
<div class="wrap">
  <header class="hero">
    <h1>המנהיגים של חיי</h1>
    <p>הזינו את תאריך הלידה שלכם וגלו מי כיהנו כראשי ממשלה, רמטכ"לים ונשיאי המדינה מאז שנולדתם.</p>
  </header>

  <div class="panel">
    <form id="form" class="field" novalidate>
      <label for="bd">תאריך לידה:</label>
      <input type="date" id="bd" name="bd" min="1900-01-01" lang="en-GB" dir="ltr" placeholder="dd/mm/yyyy">
      <button type="submit">הצג</button>
    </form>
    <div class="err" id="err"></div>
  </div>

  <button class="compare-toggle hidden" id="compareToggle">⚖️ השווה עם מישהו נוסף</button>
  <div class="compare-panel hidden" id="comparePanel">
    <p class="cp-title">⚖️ השוואה בין שני תאריכי לידה</p>
    <form class="field" id="compareForm" novalidate>
      <label for="bd2">תאריך לידה שני:</label>
      <input type="date" id="bd2" name="bd2" min="1900-01-01" lang="en-GB" dir="ltr">
      <button type="submit">השווה</button>
    </form>
    <div id="compareResults"></div>
  </div>

  <div id="summary" class="summary-box hidden"></div>
  <div id="highlights" class="highlight-box hidden"></div>
  <div id="note" class="note hidden"></div>

  'בנימין נתניהו': {
    bio: 'בנימין (ביבי) נתניהו (נולד בתל אביב, 1949) הוא מדינאי, וראש הממשלה המכהן הוותיק ביותר בתולדות ישראל. בצעירותו שירת בסיירת מטכ"ל, ולאחר מכן פנה לקריירה דיפלומטית — סגן ראש המשלחת בשגרירות ישראל בארה"ב ושגריר ישראל באו"ם בשנים 1984–1988. ב-1988 נבחר לכנסת מטעם הליכוד ועלה במהירות בהיררכיה המפלגתית. הוא כיהן כראש ממשלה שלוש פעמים (1996–1999, 2009–2021, ומ-2022), וביולי 2019 עקף את דוד בן-גוריון והפך לראש הממשלה המכהן הזמן הרב ביותר. בין המהלכים שמזוהים עם תקופתו: הרחבת יחסי החוץ של ישראל וחתימת "הסכמי אברהם" לנורמליזציה עם איחוד האמירויות ומדינות נוספות. ב-7 באוקטובר 2023 פרצה טבח חמאס האיום, שבמהלכו נרצחו כ-1,200 ישראלים ונחטפו כ-250 בני ערובה. נתניהו, שאחראי על מדיניות הביטחון שאיפשרה את המחדל, נחשב בעיני רבים כאחראי מרכזי לכישלון המודיעיני וצבאי שהוביל לטבח.',
    sources: [
      {t:'Encyclopaedia Britannica', u:'https://www.britannica.com/biography/Benjamin-Netanyahu'},
      {t:'Jewish Virtual Library', u:'https://jewishvirtuallibrary.org/benjamin-quot-bibi-quot-netanyahu'},
      {t:'CIE — Center for Israel Education', u:'https://israeled.org/benjamin-netanyahu-1949/'},
      {t:'NPR', u:'https://www.npr.org/2021/06/13/1005113363/assessing-benjamin-netanyahus-12-uninterrupted-years-in-power'}
    ]
  },
  'משה שרת': {
    bio: 'משה שרת (נולד שרתוק באוקראינה, 1894; נפטר ב-1965) היה ממנהיגי תנועת העבודה, שר החוץ הראשון של ישראל וראש הממשלה השני שלה. הוא עלה לארץ ב-1906, ומ-1933 עמד בראש המחלקה המדינית של הסוכנות היהודית — תפקיד מפתח במאבק המדיני להקמת המדינה. עם קום המדינה ב-1948 מונה לשר החוץ, וכיהן כראש ממשלה מינואר 1954 עד נובמבר 1955 בעת היעדרותו של בן-גוריון. שרת ייצג קו מדיני מתון ודיפלומטי, שהוביל לחיכוכים מתמשכים עם בן-גוריון בנוגע למדיניות הביטחון. לאחר שובו של בן-גוריון לראשות הממשלה הודח שרת מתפקיד שר החוץ ב-1956. הוא מכונה לעיתים "ראש הממשלה הנשכח", אך תרומתו לעיצוב מדיניות החוץ של ישראל נחשבת מכרעת.',
    sources: [
      {t:'Encyclopaedia Britannica', u:'https://www.britannica.com/biography/Moshe-Sharett'},
      {t:'Encyclopedia.com', u:'https://www.encyclopedia.com/politics/dictionaries-thesauruses-pictures-and-press-releases/sharett-moshe-1894-1965'},
      {t:'The Jerusalem Post', u:'https://www.jpost.com/opinion/article-719646'}
    ]
  },
  'לוי אשכול': {
    bio: 'לוי אשכול (נולד באוקראינה, 1895; נפטר ב-1969) היה חלוץ ציוני, איש כספים ומדינאי, ראש הממשלה השלישי של ישראל. הוא עלה לארץ ב-1914, עבד כפועל חקלאי והיה ממקימי ההתיישבות העובדת. כשר האוצר (1952–1963) מילא תפקיד מרכזי בבניין הכלכלה והתשתיות של המדינה הצעירה, ועם פרישת בן-גוריון ב-1963 ירש אותו כראש ממשלה. האירוע המכונן בכהונתו היה מלחמת ששת הימים (יוני 1967); ערב המלחמה הקים ממשלת אחדות והעביר את תיק הביטחון למשה דיין. אשכול נפטר מהתקף לב ב-26 בפברואר 1969 והיה ראש הממשלה הראשון שהלך לעולמו בעת כהונתו.',
    sources: [
      {t:'Encyclopaedia Britannica', u:'https://www.britannica.com/biography/Levi-Eshkol'},
      {t:'Jewish Virtual Library', u:'https://jewishvirtuallibrary.org/levi-eshkol'},
      {t:'The Prime Ministers (אתר)', u:'https://theprimeministers.org/biography-levi-eshkol/'}
    ]
  },
  'גולדה מאיר': {
    bio: 'גולדה מאיר (נולדה בקייב, 1898; נפטרה ב-1978) הייתה מדינאית, ראש הממשלה הרביעית של ישראל והאישה היחידה שכיהנה בתפקיד. בילדותה היגרה משפחתה למילווקי שבארה"ב, ומשם עלתה לארץ ישראל ב-1921 והצטרפה לקיבוץ. היא כיהנה כשרת העבודה וכשרת החוץ, ונבחרה לראשות הממשלה ב-1969 — מן הנשים הראשונות בעולם שעמדו בראש ממשלה. כהונתה לוותה במשבר מלחמת יום הכיפורים (אוקטובר 1973), שפרצה בהפתעה. אף שצה"ל התאושש והכריע במלחמה, האובדן הכבד והמחדל הוטלו במידה רבה לפתחה, והיא התפטרה ב-1974. גולדה נותרה סמל למנהיגות נחושה בתקופה מערערת.',
    sources: [
      {t:'Encyclopaedia Britannica', u:'https://www.britannica.com/biography/Golda-Meir'},
      {t:'Jewish Women’s Archive', u:'https://jwa.org/encyclopedia/article/meir-golda'},

      {t:'Jewish Virtual Library', u:'https://jewishvirtuallibrary.org/golda-meir'}
    ]
  },
  'מנחם בגין': {
    bio: 'מנחם בגין (נולד בברסט-ליטובסק, 1913; נפטר ב-1992) היה מנהיג לאומי ומדינאי, ראש הממשלה השישי של ישראל והראשון מן הימין. בנעוריו הנהיג את תנועת בית"ר בפולין, וב-1942 הגיע לארץ ישראל. בשנים 1943–1948 פיקד על ארגון האצ"ל במאבק נגד השלטון הבריטי, ולאחר קום המדינה ייסד את תנועת חרות והוביל את האופוזיציה במשך כשלושה עשורים. ב-1977, ב"מהפך", הביא את הליכוד לשלטון. ההישג ההיסטורי של כהונתו היה הסכמי קמפ דייוויד (1978) עם נשיא מצרים אנואר סאדאת, שהובילו להסכם השלום בין ישראל למצרים ב-1979; על כך זכה בפרס נובל לשלום ב-1978. בגין התפטר ב-1983 על רקע מלחמת לבנון ופטירת רעייתו.',
    sources: [
      {t:'Encyclopaedia Britannica', u:'https://www.britannica.com/biography/Menachem-Begin'},
      {t:'NobelPrize.org', u:'https://www.nobelprize.org/prizes/peace/1978/begin/biographical/'},
      {t:'Jewish Virtual Library', u:'https://jewishvirtuallibrary.org/menachem-begin'}
    ]
  },
  'יצחק שמיר': {
    bio: 'יצחק שמיר (נולד בפולין, 1915; נפטר ב-2012) היה לוחם מחתרת ומדינאי, ראש הממשלה השביעי של ישראל. בצעירותו עלה לארץ ב-1935, הצטרף לאצ"ל ולאחר מכן ללח"י, שבו שימש כאחראי המבצעים ומהבכירים במחתרת זו. בשנים שלאחר קום המדינה שירת כעשור בשירות המוסד באירופה. ב-1973 נבחר לכנסת מטעם הליכוד, כיהן כיושב-ראש הכנסת וכשר החוץ, ועלה לראשות הממשלה ב-1983. הוא כיהן כראש ממשלה בשנים 1983–1984 ו-1986–1992, בין השאר במסגרת ממשלות אחדות וברוטציה עם שמעון פרס. שמיר זוהה עם קו לאומי ניצי ועם עמדה נחרצת בנוגע לשטחים ולהתיישבות.',
    sources: [
      {t:'Encyclopaedia Britannica', u:'https://www.britannica.com/biography/Yitzhak-Shamir'},
      {t:'Jewish Virtual Library', u:'https://jewishvirtuallibrary.org/yitzhak-shamir'},
      {t:'Brookings Institution', u:'https://www.brookings.edu/articles/former-israeli-prime-minister-yitzhak-shamir-a-stalwart-of-israeli-conservatism/'}
    ]
  },
  'שמעון פרס': {
    bio: 'שמעון פרס (נולד בפולין, 1923; נפטר ב-2016) היה מדינאי ותיק, ראש הממשלה השמיני של ישראל והנשיא התשיעי שלה. הוא עלה לארץ ב-1934, וכבר בצעירותו היה מקורב לבן-גוריון; בגיל צעיר שימש מנכ"ל משרד הביטחון והיה מעורב בבניין עוצמתה הביטחונית של ישראל. לאורך הקריירה כיהן בשורת תפקידים בכירים והנהיג את מפלגת העבודה. הוא כיהן כראש ממשלה פעמיים (1984–1986, 1995–1996) וכנשיא המדינה בשנים 2007–2014. כשר החוץ היה ממובילי הסכמי אוסלו, ועל כך זכה בפרס נובל לשלום ב-1994 יחד עם יצחק רבין ויאסר ערפאת. פרס נחשב לאחרון מנהיגי דור המייסדים.',
    sources: [
      {t:'Encyclopaedia Britannica', u:'https://www.britannica.com/biography/Shimon-Peres'},
      {t:'NobelPrize.org', u:'https://www.nobelprize.org/prizes/peace/1994/peres/biographical/'},
      {t:'מרכז פרס לשלום ולחדשנות', u:'https://www.peres-center.org/en/shimon-peres/about/'}
    ]
  },
  'אהוד ברק': {
    bio: 'אהוד ברק (נולד בקיבוץ משמר השרון, 1942) הוא איש צבא ומדינאי, ראש הממשלה העשירי של ישראל. הוא התגייס לצה"ל ב-1959 ובנה קריירה צבאית יוצאת דופן, בעיקר כמפקד בסיירת מטכ"ל ובמבצעים מיוחדים נועזים. ב-1991 מונה לרמטכ"ל, ופרש ב-1995 כחייל המעוטר ביותר בתולדות צה"ל. לאחר מעבר לפוליטיקה במפלגת העבודה כיהן כשר הפנים וכשר החוץ, ובמאי 1999 נבחר לראשות הממשלה בבחירה ישירה. כראש ממשלה (1999–2001) ניסה לקדם הסדר מדיני, ובכלל זה שיחות קמפ דייוויד עם יאסר ערפאת בשנת 2000. לימים כיהן גם כשר הביטחון בממשלות אולמרט ונתניהו.',
    sources: [
      {t:'Encyclopaedia Britannica', u:'https://www.britannica.com/biography/Ehud-Barak'},
      {t:'Jewish Virtual Library', u:'https://jewishvirtuallibrary.org/ehud-barak'},
      {t:'Academy of Achievement', u:'https://achievement.org/achiever/ehud-barak/'}
    ]
  },
  'אריאל שרון': {
    bio: 'אריאל שרון (נולד בכפר מל"ל, 1928; נפטר ב-2014) היה גנרל ומדינאי, ראש הממשלה האחד-עשר של ישראל. הוא היה מהמפקדים הבולטים בצה"ל — לחם במלחמת העצמאות, פיקד על אוגדה במלחמת ששת הימים, והוביל את צליחת תעלת סואץ במלחמת יום הכיפורים. שרון נודע גם כמי שקידם את מפעל ההתנחלויות. הוא נבחר לראשות הממשלה ב-2001, ובכהונתו יזם והוציא לפועל את תוכנית ההתנתקות מרצועת עזה ב-2005. בנובמבר 2005 פרש מהליכוד והקים את מפלגת קדימה, אך ב-4 בינואר 2006 לקה בשבץ מוחי קשה שהותיר אותו במצב סיעודי עד פטירתו ב-2014.',
    sources: [
      {t:'Encyclopaedia Britannica', u:'https://www.britannica.com/biography/Ariel-Sharon'},
      {t:'NPR', u:'https://www.npr.org/2014/01/15/5132166/reports-ariel-sharon-whose-life-and-career-shaped-israeli-history-dies'},
      {t:'EBSCO Research Starters', u:'https://www.ebsco.com/research-starters/military-history-and-science/ariel-sharon'}
    ]
  },
  'אהוד אולמרט': {
    bio: 'אהוד אולמרט (נולד ליד בנימינה, 1945) הוא עורך דין ומדינאי, ראש הממשלה השנים-עשר של ישראל. הוריו היו חברי האצ"ל, והוא נבחר לכנסת כבר ב-1973 מטעם הליכוד — אחד הצעירים שנבחרו אי-פעם. בין 1993 ל-2003 כיהן כראש עיריית ירושלים, לאחר שהביס את ראש העיר הוותיק טדי קולק. ב-2003 חזר לפוליטיקה הארצית כסגן ראש הממשלה בממשלת שרון. עם שבץ שרון בינואר 2006 הפך לראש ממשלה בפועל, וניצח בבחירות באותה שנה בראש מפלגת קדימה. בכהונתו (2006–2009) הוביל את ישראל במלחמת לבנון השנייה. לימים הורשע בפרשות שחיתות וריצה עונש מאסר.',
    sources: [
      {t:'Encyclopaedia Britannica', u:'https://www.britannica.com/biography/Ehud-Olmert'},
      {t:'The Times of Israel', u:'https://www.timesofisrael.com/a-look-at-ehud-olmerts-political-career/'},
      {t:'Jewish Virtual Library', u:'https://jewishvirtuallibrary.org/ehud-olmert'}
    ]
  },
  'נפתלי בנט': {
    bio: 'נפתלי בנט (נולד בחיפה, 1972) הוא יזם הייטק ומדינאי, ראש הממשלה השלושה-עשר של ישראל. בשירותו הצבאי שירת ביחידות העילית סיירת מטכ"ל ומגלן, ולאחר מכן השלים תואר במשפטים. בעולם ההייטק הקים את חברת Cyota שנמכרה ב-2005 בכ-145 מיליון דולר, והיה למנכ"ל סטארט-אפ נוסף שנמכר אף הוא. דרכו הפוליטית החלה ב-2006 כראש מטהו של נתניהו, ובהמשך הנהיג את מפלגת ימינה. לאחר מערכת בחירות רביעית בתוך שנתיים, הצטרף ב-2021 ל"ממשלת השינוי" הרחבה — קואליציה חסרת תקדים של ימין, שמאל ומפלגה ערבית — והפך לראש ממשלה ברוטציה עם יאיר לפיד. הוא היה ראש הממשלה הראשון החובש כיפה. הקואליציה השברירית התפרקה כעבור כשנה.',
    sources: [
      {t:'Encyclopaedia Britannica', u:'https://www.britannica.com/biography/Naftali-Bennett'},
      {t:'Jewish Virtual Library', u:'https://jewishvirtuallibrary.org/naftali-bennett'},
      {t:'CNN', u:'https://www.cnn.com/2021/06/14/middleeast/naftali-bennett-israel-profile-update-intl-cmd/index.html'}
    ]
  },
  'יאיר לפיד': {
    bio: 'יאיר לפיד (נולד בתל אביב, 1963) הוא עיתונאי לשעבר ומדינאי, ראש הממשלה הארבעה-עשר של ישראל. לפני כניסתו לפוליטיקה היה מגיש טלוויזיה, כותב ושחקן מוכר, ופרסם ספרים רבים. בתחילת 2012 פרש מהעיתונאות והקים את מפלגת "יש עתיד", שהתמקדה במעמד הביניים, בשוויון בנטל ובחינוך. המפלגה הפתיעה בבחירות 2013, ולפיד כיהן כשר האוצר. הוא היה מהאדריכלים המרכזיים של "ממשלת השינוי" ב-2021, כיהן כשר החוץ, וב-1 ביולי 2022 נכנס לתפקיד ראש הממשלה כראש ממשלת מעבר, עד דצמבר 2022. לאחר מכן עמד בראש האופוזיציה.',
    sources: [
      {t:'Encyclopaedia Britannica', u:'https://www.britannica.com/biography/Yair-Lapid'},
      {t:'Jewish Virtual Library', u:'https://jewishvirtuallibrary.org/yair-lapid'},
      {t:'gov.il — משרד ראש הממשלה', u:'https://www.gov.il/en/pages/lapid'}
    ]
  },
  'חיים ויצמן': {
    bio: 'חיים ויצמן (נולד במוטל שבאימפריה הרוסית, 1874; נפטר ברחובות, 1952) היה כימאי דגול ומנהיג ציוני, ונשיאה הראשון של מדינת ישראל. כמדען פיתח תהליך תסיסה לייצור אצטון שסייע לבריטים במלחמת העולם הראשונה, והוא נחשב מאבות הביוטכנולוגיה. במשך עשורים עמד בראש ההסתדרות הציונית העולמית, ומעמדו וקשריו תרמו לקבלת הצהרת בלפור (1917). עם הקמת המדינה נבחר ב-1949 לנשיא הראשון — תפקיד ייצוגי ברובו — וגייס תרומות עתק למען המדינה הצעירה ולמדע. על שמו קרוי מכון ויצמן למדע ברחובות. ויצמן נחשב לאחד ממעצבי דרכה המדינית של התנועה הציונית.',
    sources: [
      {t:'Encyclopaedia Britannica', u:'https://www.britannica.com/biography/Chaim-Weizmann'},
      {t:'הספרייה הלאומית של ישראל', u:'https://www.nli.org.il/en/discover/israel/figures/chaim-weizmann'},

    ]
  },
  'יצחק בן-צבי': {
    bio: 'יצחק בן-צבי (נולד בפולטבה שבאוקראינה, 1884; נפטר בירושלים, 1963) היה ממנהיגי תנועת העבודה, חוקר והיסטוריון, ונשיאה השני של ישראל. בצעירותו היה פעיל ציוני-סוציאליסטי, סייע בהקמת ארגון "השומר" להגנת היישובים (1908) וייסד בירושלים בית ספר תיכון עברי. הוא היה מחותמי מגילת העצמאות ב-1948 ונבחר לכנסת. ב-1952 נבחר לנשיא, וכיהן בתפקיד עד מותו ב-1963 — כהונת הנשיאות הארוכה ביותר בתולדות המדינה. בן-צבי היה גם חוקר נודע של קהילות ישראל ועדות המזרח, וייסד את המכון לחקר קהילות ישראל (מכון בן-צבי). הוא נודע באורח חייו הצנוע.',
    sources: [
      {t:'Encyclopaedia Britannica', u:'https://www.britannica.com/biography/Itzhak-Ben-Zvi'},
      {t:'CIE — Center for Israel Education', u:'https://israeled.org/yitzhak-ben-zvi-passes-away/'},
      {t:'Encyclopedia.com', u:'https://www.encyclopedia.com/religion/encyclopedias-almanacs-transcripts-and-maps/ben-zvi-shimshelevich-izhak'}
    ]
  },
  'זלמן שזר': {
    bio: 'זלמן שזר (נולד שניאור זלמן רובשוב במיר שברוסיה, 1889; נפטר ב-1974) היה עיתונאי, חוקר, סופר ומדינאי, ונשיאה השלישי של ישראל. הוא גדל במשפחת חב"ד, פנה לעיתונות ולמד היסטוריה ופילוסופיה באוניברסיטאות בגרמניה. ב-1924 השתקע בתל אביב והיה ממקימי העיתון "דבר" של תנועת העבודה, ואף ערך אותו. בממשלה הראשונה כיהן כשר החינוך והתרבות. ב-21 במאי 1963 בחרה בו הכנסת לנשיא, הוא נבחר שוב ב-1968 ופרש ב-1973. שזר היה גם משורר וסופר פורה, ועל שמו קרוי "מרכז זלמן שזר" לחקר תולדות עם ישראל.',
    sources: [
      {t:'Encyclopaedia Britannica', u:'https://www.britannica.com/biography/Zalman-Shazar'},
      {t:'CIE — Center for Israel Education', u:'https://israeled.org/zalman-shazar-elected-israels-third-president/'},
      {t:'הספרייה הלאומית של ישראל', u:'https://www.nli.org.il/en/a-topic/987007267936305171'}
    ]
  },
  'אפרים קציר': {
    bio: 'אפרים קציר (קצ׳לסקי) (נולד בקייב, 1916; נפטר ב-2009) היה ביופיזיקאי דגול ומדען, ונשיאה הרביעי של ישראל. הוא עלה לארץ בילדותו, למד באוניברסיטה העברית, ולימים עמד בראש מחלקת הביופיזיקה במכון ויצמן למדע. קציר היה מומחה עולמי לחקר חלבונים, והישראלי הראשון שנבחר לאקדמיה הלאומית למדעים של ארה"ב. ב-1973 נבחר בידי הכנסת לנשיא. סמוך לסוף כהונתו, בנובמבר 1977, נפלה בחלקו הזכות לארח את נשיא מצרים אנואר סאדאת בביקור הרשמי הראשון של מנהיג ערבי בישראל. עם תום כהונתו ב-1978 שב להוראה ולמחקר מדעי.',
    sources: [
      {t:'Encyclopaedia Britannica', u:'https://www.britannica.com/biography/Ephraim-Katzir'},
      {t:'Encyclopedia.com', u:'https://www.encyclopedia.com/religion/encyclopedias-almanacs-transcripts-and-maps/katzir-katchalski-ephraim'},
      {t:'Ukrainian Jewish Encounter', u:'https://ukrainianjewishencounter.org/en/ephraim-katzir-katchalski-1916-2009/'}
    ]
  },
  'יצחק נבון': {
    bio: 'יצחק נבון (נולד בירושלים, 1921; נפטר ב-2015) היה מדינאי וסופר, ונשיאה החמישי של ישראל. הוא נולד למשפחה ספרדית ותיקה בירושלים, ובמלחמת העצמאות עמד בראש המחלקה הערבית של ה"הגנה" בעיר. לאחר מכן שימש מזכירו המדיני של שר החוץ משה שרת ומנהל לשכת ראש הממשלה בימי בן-גוריון ושרת. ב-1978 נבחר בידי הכנסת לנשיא — הנשיא הראשון ממוצא ספרדי והראשון שנולד בארץ ישראל. נבון היה גם איש תרבות שכתב את המחזה המוזיקלי "בוסתן ספרדי", ופעל לשימור מורשת הלאדינו. לאחר כהונתו שב לפוליטיקה וכיהן כשר החינוך.',
    sources: [
      {t:'Encyclopedia.com', u:'https://www.encyclopedia.com/religion/encyclopedias-almanacs-transcripts-and-maps/navon-yitzhak'},
      {t:'The Times of Israel', u:'https://www.timesofisrael.com/yitzhak-navon-israels-fifth-president-dies-at-94/'},
      {t:'Jewish Virtual Library', u:'https://jewishvirtuallibrary.org/yitzhak-navon'}
    ]
  },
  'חיים הרצוג': {
    bio: 'חיים הרצוג (נולד בבלפסט שבאירלנד, 1918; נפטר ב-1997) היה איש צבא, משפטן ומדינאי, ונשיאה השישי של ישראל. הוא היה בנו של הרב הראשי יצחק אייזיק הרצוג, עלה לארץ ב-1935, ובצה"ל הגיע לדרגת אלוף ועמד פעמיים בראש אגף המודיעין. לאחר כיבוש יהודה ושומרון במלחמת ששת הימים (1967) מונה למושל הצבאי הראשון של האזור, ונודע גם כפרשן צבאי בכיר. כשגריר ישראל באו"ם (1975–1978) הוביל את המאבק נגד החלטת האו"ם שהשוותה ציונות לגזענות, ובנאומו קרע את נוסח ההחלטה. ב-1983 נבחר לנשיא וכיהן שתי כהונות עד 1993. הוא היה גם סופר שכתב על תולדות ישראל.',
    sources: [
      {t:'Encyclopaedia Britannica', u:'https://www.britannica.com/biography/Chaim-Herzog'},
      {t:'CIE — Center for Israel Education', u:'https://israeled.org/chaim-herzog-1918-1997/'},
      {t:'עמותת יד חיים הרצוג', u:'https://yadchaimherzog.org.il/en/the-story/'}
    ]
  },
  'עזר ויצמן': {
    bio: 'עזר ויצמן (נולד בתל אביב, 1924; נפטר ב-2005) היה מפקד צבאי ומדינאי, ונשיאה השביעי של ישראל. הוא היה אחיינו של הנשיא הראשון חיים ויצמן, ובמלחמת העולם השנייה שירת כטייס בחיל האוויר המלכותי הבריטי. ויצמן היה מהקצינים המייסדים של חיל האוויר הישראלי, וכמפקד החיל מ-1958 הוביל את בנייתו ואת המודרניזציה שלו — תשתית להצלחתו במלחמת ששת הימים. ב-1977 מונה לשר הביטחון ומילא תפקיד מרכזי במשא ומתן לשלום עם מצרים שהוביל להסכמי קמפ דייוויד. הוא כיהן כנשיא בשנים 1993–2000, והתפטר על רקע חקירה בעניין כספים ומצב בריאותי.',
    sources: [
      {t:'Encyclopaedia Britannica', u:'https://www.britannica.com/biography/Ezer-Weizman'},
      {t:'CIE — Center for Israel Education', u:'https://israeled.org/ezer-weizman-elected/'},
      {t:'הספרייה הלאומית של ישראל', u:'https://blog.nli.org.il/en/ezer_weizman/'}
    ]
  },
  'משה קצב': {
    bio: 'משה קצב (נולד ביזד שבאיראן, 1945) הוא פוליטיקאי, ונשיאה השמיני של ישראל. משפחתו עלתה לישראל ב-1951 והתיישבה בקריית מלאכי, שם נבחר בגיל 24 לראש העיר הצעיר במדינה. כחבר ותיק בליכוד כיהן כחבר כנסת וכשר בתיקים שונים, ובשנת 2000 נבחר לנשיא לאחר שגבר במפתיע על שמעון פרס — הנשיא הראשון מטעם הליכוד. קצב כיהן עד שהתפטר ב-2007 על רקע חשדות פליליים. בדצמבר 2010 הורשע בשני מקרי אונס ובעבירות נוספות, ובמרץ 2011 נגזרו עליו שבע שנות מאסר — תקדים חסר אח ורע של ראש מדינה לשעבר שנשפט והורשע בישראל. הוא שוחרר ב-2016.',
    sources: [
      {t:'Encyclopedia.com', u:'https://www.encyclopedia.com/politics/dictionaries-thesauruses-pictures-and-press-releases/katsav-moshe-1945'},
      {t:'Al Jazeera', u:'https://www.aljazeera.com/news/2009/3/8/profile-moshe-katsav-2'},
      {t:'NBC News', u:'https://www.nbcnews.com/id/wbna40849923'}
    ]
  },
  'ראובן ריבלין': {
    bio: 'ראובן (רובי) ריבלין (נולד בירושלים, 1939) הוא משפטן ומדינאי, ונשיאה העשירי של ישראל. הוא בן למשפחה ירושלמית ותיקה ששורשיה בעיר מראשית המאה ה-19. לאחר שירות כקצין מודיעין למד משפטים באוניברסיטה העברית. כחבר הליכוד נבחר לראשונה לכנסת ב-1988, כיהן כשר התקשורת, ופעמיים כיושב-ראש הכנסת — תפקיד שבו נודע בהגנתו על עצמאות הפרלמנט ועל זכויות מיעוטים. ב-2014 נבחר לנשיא בתמיכה רחבה וכיהן עד 2021. בכהונתו נשא נאום מכונן על "ארבעת השבטים" של החברה הישראלית — חילונים, דתיים, חרדים וערבים — וקרא לאחדות ולכבוד הדדי.',
    sources: [
      {t:'מכון ויצמן למדע', u:'https://www.weizmann.ac.il/sites/scientific-council/honorary-phd/president-reuven-ruvi-rivlin'},
      {t:'CIE — Center for Israel Education', u:'https://israeled.org/reuven-rivlin-1939/'},
      {t:'The Times of Israel', u:'https://www.timesofisrael.com/the-presidency-that-was-reuven-rivlins-seven-years-in-office/'}
    ]
  },
  'יצחק הרצוג': {
    bio: 'יצחק (בוז׳י) הרצוג (נולד בתל אביב, 1960) הוא משפטן ומדינאי, ונשיאה האחד-עשר והמכהן של ישראל. הוא בן למשפחה מהמיוחסות בישראל — בנו של הנשיא חיים הרצוג ונכדו של הרב הראשי יצחק אייזיק הרצוג. הרצוג בנה את הקריירה הפוליטית במפלגת העבודה, כיהן כמזכיר הממשלה בימי אהוד ברק, ונכנס לכנסת ב-2003. הוא כיהן בשורת תפקידי שרים, עמד בראש מפלגת העבודה והאופוזיציה מ-2013, ובשנים 2018–2021 שימש יושב-ראש הסוכנות היהודית. ביוני 2021 נבחר לנשיא בתמיכה רחבה במיוחד — 87 חברי כנסת — ונכנס לתפקידו ב-7 ביולי 2021.',
    sources: [
      {t:'נשיא המדינה (president.gov.il)', u:'https://www.president.gov.il/en/president/'},
      {t:'הסוכנות היהודית', u:'https://www.jewishagency.org/isaac-herzog-bio/'},
      {t:'Encyclopaedia Britannica', u:'https://www.britannica.com/biography/Isaac-Herzog'}
    ]
  },
  'יעקב דורי': {
    bio: 'יעקב דורי (נולד יעקב דוסטרובסקי באוקראינה, 1899; נפטר ב-1973) היה הרמטכ"ל הראשון של צה"ל. בנעוריו עלתה משפחתו לארץ, ובמלחמת העולם הראשונה התנדב לגדוד העברי בצבא הבריטי; לאחר מכן למד הנדסה באירופה. ב-1939 מונה לרמטכ"ל ה"הגנה" ופעל להפיכתה מארגון מגן מבוזר לצבא מסודר. עם הקמת צה"ל ב-1948 נעשה לרמטכ"ל הראשון והנהיג את הצבא במלחמת העצמאות, חרף מחלה שליוותה אותו. לאחר פרישתו כיהן שנים רבות כנשיא הטכניון בחיפה (1951–1965).',
    sources: [
      {t:'צה"ל — רמטכ"לים בעבר (idf.il)', u:'https://www.idf.il/en/mini-sites/past-chiefs-of-staff/lt-gen-yaacov-dori-1948-1949/'},
      {t:'Jewish Telegraphic Agency', u:'https://www.jta.org/archive/gen-yaakov-dori-first-chief-of-staff-of-israels-armed-forces-dead-at-73'},
      {t:'Encyclopedia.com', u:'https://www.encyclopedia.com/religion/encyclopedias-almanacs-transcripts-and-maps/dori-dostrovsky-yaakov'}
    ]
  },
  'יגאל ידין': {
    bio: 'יגאל ידין (נולד בירושלים, 1917; נפטר ב-1984) היה איש צבא וארכאולוג דגול, הרמטכ"ל השני של צה"ל. הוא היה חבר ב"הגנה", שימש כראש אגף המבצעים במלחמת העצמאות והיה אחראי לחלק מההכרעות המרכזיות במהלכה. בשנים 1949–1952 כיהן כרמטכ"ל ועיצב את צה"ל בשנותיו הראשונות. לאחר פרישתו פנה למחקר ארכאולוגי ונודע בחפירותיו בחצור, במגילות ים המלח ובמצדה, וזכה בפרס ישראל. בשלהי שנות ה-70 שב לחיים הציבוריים והנהיג את תנועת ד"ש, וכיהן כסגן ראש הממשלה (1977–1981).',
    sources: [
      {t:'Encyclopaedia Britannica', u:'https://www.britannica.com/biography/Yigael-Yadin'},
      {t:'הספרייה הלאומית של ישראל', u:'https://blog.nli.org.il/en/yigael_yadin/'},
      {t:'Encyclopedia.com', u:'https://www.encyclopedia.com/religion/encyclopedias-almanacs-transcripts-and-maps/yadin-sukenik-yigael'}
    ]
  },
  'מרדכי מקלף': {
    bio: 'מרדכי מקלף (נולד במוצא שליד ירושלים, 1920; נפטר ב-1978) היה הרמטכ"ל השלישי של צה"ל. בילדותו, במאורעות 1929, נרצחה כמעט כל משפחתו בהתקפה מהכפר הסמוך קלוניא, והוא ניצל בקפיצה מחלון. הוא הצטרף לפלוגות הנוער של ה"הגנה", שירת ב"פלוגות הלילה המיוחדות" ובצבא הבריטי במלחמת העולם השנייה. במלחמת העצמאות לחם בחטיבת כרמלי והשתתף במבצע חירם לשחרור הגליל. ב-1952, בגיל 32 בלבד, מונה לרמטכ"ל לתקופה של שנה, ובמהלכה הטיל על אריאל שרון להקים את יחידת הקומנדו (יחידה 101). לאחר שירותו ניהל את מפעלי ים המלח.',
    sources: [
      {t:'צה"ל — רמטכ"לים בעבר (idf.il)', u:'https://www.idf.il/en/mini-sites/past-chiefs-of-staff/lt-gen-mordechai-maklef-1952-1953/'},
      {t:'The Jewish Press', u:'https://jewishpress.com/mordechai-maklef-and-david-ben-gurion/'}
    ]
  },
  'משה דיין': {
    bio: 'משה דיין (נולד בדגניה, 1915, וגדל בנהלל; נפטר ב-1981) היה מצביא ומדינאי, הרמטכ"ל הרביעי של צה"ל ואחד מסמליה של ישראל. ב-1941, בקרב נגד צרפת של וישי בסוריה, איבד את עינו השמאלית, ומאז חבש את הרטייה השחורה שהפכה לסימן ההיכר שלו. כרמטכ"ל (1953–1958) עיצב את תפיסת הפעולה ההתקפית של צה"ל. ערב מלחמת ששת הימים (1967) מונה לשר הביטחון והוביל יחד עם הרמטכ"ל רבין את הניצחון, אך ספג ביקורת קשה על המחדל במלחמת יום הכיפורים (1973). לימים, כשר החוץ בממשלת בגין, היה מאדריכלי הסכמי קמפ דייוויד.',
    sources: [
      {t:'Encyclopaedia Britannica', u:'https://www.britannica.com/biography/Moshe-Dayan'},
      {t:'צה"ל — רמטכ"לים בעבר (idf.il)', u:'https://www.idf.il/en/mini-sites/past-chiefs-of-staff/lt-gen-moshe-dayan-1953-1958/'},
      {t:'Jewish Virtual Library', u:'https://jewishvirtuallibrary.org/moshe-dayan'}
    ]
  },
  'חיים לסקוב': {
    bio: 'חיים לסקוב (נולד בבריסוב שברוסיה, 1919; נפטר ב-1982) היה הרמטכ"ל החמישי של צה"ל. הוא עלה לארץ ב-1925, הצטרף בנעוריו ל"הגנה" ושירת ב"פלוגות הלילה המיוחדות", ובמלחמת העולם השנייה לחם כקצין בבריגדה היהודית באיטליה. למרות שלא היה טייס, מונה למפקד חיל האוויר, ולאחר מכן למפקד חיל השריון. כרמטכ"ל (1958–1961) התמקד בבניין כוחה של צה"ל, ובתקופתו נרכשו הצוללת הראשונה ומטוסי "סופר מיסטר". לאחר פרישתו עמד בראש רשות הנמלים, ולימים מונה לנציב קבילות החיילים הראשון.',
    sources: [
      {t:'צה"ל — רמטכ"לים בעבר (idf.il)', u:'https://www.idf.il/en/mini-sites/past-chiefs-of-staff/lt-gen-haim-laskov-1958-1961/'},

    ]
  },
  'צבי צור': {
    bio: 'צבי (צ׳רה) צור (נולד באוקראינה, 1923; נפטר ב-2004) היה הרמטכ"ל השישי של צה"ל. הוא עלה לארץ ב-1925, הצטרף ל"הגנה" ב-1939, ובמלחמת העצמאות לחם בחטיבת גבעתי, בין השאר בקרבות על הדרך לירושלים ובחזית הדרום. בהמשך עמד בראש אגף כוח האדם, פיקד על פיקוד המרכז וכיהן כסגן הרמטכ"ל. כרמטכ"ל (1961–1963) פעל בתקופה של רוגע יחסי בגבולות, וניצל אותה לחיזוק תורת הלחימה, כוח האדם והציוד של צה"ל. לאחר פרישתו ניהל את חברת מקורות, ובמלחמת יום הכיפורים שימש עוזר בכיר לשר הביטחון משה דיין.',
    sources: [
      {t:'צה"ל — רמטכ"לים בעבר (idf.il)', u:'https://www.idf.il/en/mini-sites/past-chiefs-of-staff/lt-gen-tzvi-tzur-1961-1963/'},
      {t:'Wilson Center', u:'https://www.wilsoncenter.org/tzvi-tzur'}
    ]
  },
  'חיים בר-לב': {
    bio: 'חיים בר-לב (נולד בווינה, 1924; נפטר ב-1994) היה מצביא ומדינאי, הרמטכ"ל השמיני של צה"ל. הוא עלה לארץ ב-1939, שירת בפלמ"ח, ובמלחמת העצמאות פיקד על כוחות בחטיבת הנגב; במבצע סיני הוביל חטיבת שריון עד תעלת סואץ. כרמטכ"ל (1968–1972) עמד בראש צה"ל בתקופת מלחמת ההתשה, ובתקופתו נבנה "קו בר-לב" — מערך הביצורים לאורך תעלת סואץ. במלחמת יום הכיפורים הוחזר לשירות פעיל ופיקד על החזית מול מצרים. בהמשך כיהן כשר וכחבר כנסת מטעם מפלגת העבודה, וכשגריר ישראל ברוסיה.',
    sources: [
      {t:'צה"ל — רמטכ"לים בעבר (idf.il)', u:'https://www.idf.il/en/mini-sites/past-chiefs-of-staff/lt-gen-chaim-bar-lev-1968-1972/'},
      {t:'Encyclopedia.com', u:'https://www.encyclopedia.com/religion/encyclopedias-almanacs-transcripts-and-maps/bar-lev-originally-brotzlewsky-haim'}
    ]
  },
  'דוד אלעזר': {
    bio: 'דוד ("דדו") אלעזר (נולד בסרייבו, 1925; נפטר ב-1976) היה הרמטכ"ל התשיעי של צה"ל. הוא עלה לארץ ב-1940 במסגרת עליית הנוער, הצטרף לפלמ"ח ולחם בחטיבת הראל על הדרך לירושלים. לאחר מכן עבר לחיל השריון, ובמלחמת ששת הימים, כמפקד פיקוד הצפון, הוביל את כיבוש רמת הגולן. כרמטכ"ל (1972–1974) עמד בראש צה"ל במלחמת יום הכיפורים; ועדת אגרנט המליצה על סיום כהונתו עקב המחדל, והוא התפטר. הוא נפטר מהתקף לב ב-1976, ועל שמו קרוי "מרכז דדו" לחשיבה צבאית.',
    sources: [
      {t:'צה"ל — רמטכ"לים בעבר (idf.il)', u:'https://www.idf.il/en/mini-sites/past-chiefs-of-staff/lt-gen-david-elazar-1972-1974/'},
      {t:'Encyclopaedia Britannica', u:'https://www.britannica.com/biography/David-Elazar'},
      {t:'Jewish Virtual Library', u:'https://www.jewishvirtuallibrary.org/david-quot-dado-quot-elazar'}
    ]
  },
  'מרדכי גור': {
    bio: 'מרדכי ("מוטה") גור (נולד בירושלים, 1930; נפטר ב-1995) היה מצביא ומדינאי, הרמטכ"ל העשירי של צה"ל. את רוב הקריירה הצבאית עשה בחטיבת הצנחנים והפך לאחד מסמליה. במלחמת ששת הימים (1967) פיקד על חטיבת הצנחנים שכבשה את העיר העתיקה בירושלים, וקריאתו "הר הבית בידינו!" הפכה לאחד הרגעים המכוננים. כרמטכ"ל (1974–1978) שיקם את צה"ל לאחר מלחמת יום הכיפורים, פיקד על מבצע החילוץ באנטבה (1976) ועל מבצע ליטני (1978). לאחר שירותו כיהן כחבר כנסת וכשר מטעם מפלגת העבודה.',
    sources: [
      {t:'Jewish Virtual Library', u:'https://jewishvirtuallibrary.org/mordechai-motta-gur'},
      {t:'Encyclopedia.com', u:'https://www.encyclopedia.com/religion/encyclopedias-almanacs-transcripts-and-maps/gur-gorban-mordecai'},
      {t:'The Jerusalem Post', u:'https://www.jpost.com/israel-news/culture/the-life-of-mordechai-motta-gur-from-those-who-knew-him-410607'}
    ]
  },
  'רפאל איתן': {
    bio: 'רפאל ("רפול") איתן (נולד באפולה, 1929, וגדל בתל עדשים; נפטר ב-2004) היה מצביא ומדינאי, הרמטכ"ל האחד-עשר של צה"ל. הוא החל את דרכו הצבאית בגיל 16 בפלמ"ח. כרמטכ"ל (1978–1983) ייסד את תוכנית "תלפיות" המצטיינת ואת מיזם "נערי רפול" לבני נוער ממצוקה. בתפקידו פיקד על כוחות צה"ל במלחמת לבנון הראשונה (1982), וועדת כהן מתחה עליו ביקורת בעניין הטבח בסברה ושתילה. לאחר שירותו הקים את מפלגת צומת, וכיהן כחבר כנסת, כשר החקלאות וכסגן ראש הממשלה. הוא נספה בטביעה בנמל אשדוד ב-2004.',
    sources: [
      {t:'צה"ל — רמטכ"לים בעבר (idf.il)', u:'https://www.idf.il/en/mini-sites/past-chiefs-of-staff/lt-gen-rafael-eitan-1978-1983/'},
      {t:'Encyclopedia.com', u:'https://www.encyclopedia.com/religion/encyclopedias-almanacs-transcripts-and-maps/eitan-raphael'},
      {t:'CIE — Center for Israel Education', u:'https://israeled.org/gen-rafael-eitan-is-born/'}
    ]
  },
  'משה לוי': {
    bio: 'משה לוי (נולד בתל אביב למשפחה יוצאת עיראק, 1936; נפטר ב-2008) היה הרמטכ"ל השנים-עשר של צה"ל, והראשון ממוצא מזרחי בתפקיד. בשל גובהו הרב כונה "משה וחצי". הוא התגייס ב-1954 לחטיבת גולני, עבר לצנחנים, ובמבצע סיני (1956) צנח במעבר המיתלה. כרמטכ"ל (1983–1987) פיקד על נסיגת צה"ל מלבנון (1985) ועל הקמת רצועת הביטחון בדרום לבנון, וסייע בהקמת מפקדת זרוע היבשה ובהקמת חטיבות גבעתי ונח"ל. לאחר פרישתו שב לביתו בקיבוץ בית אלפא.',
    sources: [
      {t:'צה"ל — רמטכ"לים בעבר (idf.il)', u:'https://www.idf.il/en/mini-sites/past-chiefs-of-staff/lt-gen-moshe-levi-1983-1987/'},
      {t:'Encyclopedia.com', u:'https://www.encyclopedia.com/religion/encyclopedias-almanacs-transcripts-and-maps/levi-moshe'},
      {t:'CIE — Center for Israel Education', u:'https://israeled.org/gen-moshe-levi-dies/'}
    ]
  },
  'דן שומרון': {
    bio: 'דן שומרון (נולד בקיבוץ אשדות יעקב, 1937; נפטר ב-2008) היה הרמטכ"ל השלושה-עשר של צה"ל. הוא התגייס לצנחנים, ובמלחמת ששת הימים היה מהראשונים להגיע לתעלת סואץ וזכה בעיטור המופת. הוא נודע כמתכנן ומפקד הכוח הקרקעי במבצע אנטבה (1976), שבו חולצו למעלה ממאה חטופים במחיר נפגעים מועט. כראש פיקוד הדרום פיקח על נסיגת צה"ל מסיני לאחר הסכם השלום עם מצרים. כרמטכ"ל (1987–1991) הוביל את צה"ל באינתיפאדה הראשונה ובמלחמת המפרץ.',
    sources: [
      {t:'Haaretz', u:'https://www.haaretz.com/ex-chief-of-staff-dan-shomron-entebbe-commander-dies-at-70-1.240156'},
      {t:'The Jerusalem Post', u:'https://www.jpost.com/magazine/the-legacy-dan-shomron-469514'},
      {t:'Ynetnews', u:'https://www.ynetnews.com/articles/0,7340,L-3511488,00.html'}
    ]
  },
  'אמנון ליפקין-שחק': {
    bio: 'אמנון ליפקין-שחק (נולד ב-1944; נפטר ב-2012) היה מצביא ומדינאי, הרמטכ"ל החמישה-עשר של צה"ל ומהחיילים המעוטרים בתולדותיו. הוא שירת בצנחנים וזכה פעמיים בעיטור העוז — על תפקודו בקרב כראמה ועל פיקודו במבצע "אביב נעורים" בביירות. ב-1991 מונה לסגן הרמטכ"ל תחת אהוד ברק, וב-1995 ירש אותו כרמטכ"ל. בכהונתו (1995–1998) פיקד על מבצע "ענבי זעם" (1996) והיה מעורב במשא ומתן עם הפלסטינים. לאחר שירות בן 36 שנה פרש, הצטרף למפלגת המרכז וכיהן כשר.',
    sources: [
      {t:'צה"ל — רמטכ"לים בעבר (idf.il)', u:'https://www.idf.il/en/mini-sites/past-chiefs-of-staff/lt-gen-amnon-lipkin-shahak-1995-1998/'},
      {t:'Jewish Virtual Library', u:'https://www.jewishvirtuallibrary.org/amnon-lipkin-shahak'},
      {t:'The Times of Israel', u:'https://www.timesofisrael.com/former-idf-chief-lipkin-shahak-dies-in-jerusalem-hospital-aged-68/'}
    ]
  },
  'שאול מופז': {
    bio: 'שאול מופז (נולד בטהראן שבאיראן, 1948) הוא מצביא ומדינאי, הרמטכ"ל השישה-עשר של צה"ל. משפחתו עלתה לישראל ב-1957. הוא התנדב ב-1966 לחטיבת הצנחנים, לחם במלחמת ששת הימים ובמלחמת יום הכיפורים, ושימש סגן מפקד סיירת מטכ"ל והשתתף במבצע אנטבה. לאחר שפיקד על פיקוד הדרום, מונה לרמטכ"ל (1998–2002), ובכהונתו פיקח על היציאה מרצועת הביטחון בלבנון (2000) ועל המאבק באינתיפאדה השנייה. לאחר פרישתו כיהן כשר הביטחון, וכן הנהיג את מפלגת קדימה.',
    sources: [
      {t:'צה"ל — רמטכ"לים בעבר (idf.il)', u:'https://www.idf.il/en/mini-sites/past-chiefs-of-staff/lt-gen-shaul-mofaz-1998-2002/'},

      {t:'Encyclopedia.com', u:'https://www.encyclopedia.com/religion/encyclopedias-almanacs-transcripts-and-maps/mofaz-shaul'}
    ]
  },
  'משה יעלון': {
    bio: 'משה ("בוגי") יעלון (נולד בקריית חיים, 1950) הוא מצביא ומדינאי, הרמטכ"ל השבעה-עשר של צה"ל. בנעוריו (בשם סמילנסקי) היה פעיל בתנועת העבודה. הוא שירת כ-37 שנה בצה"ל, בין השאר כמפקד סיירת מטכ"ל וכראש אגף המודיעין, ועלה לדרגת רב-אלוף וכיהן כרמטכ"ל בשנים 2002–2005, בעיקר בתקופת המאבק בטרור של האינתיפאדה השנייה. לאחר שירותו פנה לפוליטיקה במסגרת הליכוד, כיהן כשר הביטחון (2013–2016), ובהמשך ייסד מסגרות פוליטיות נוספות.',
    sources: [
      {t:'Jewish Virtual Library', u:'https://jewishvirtuallibrary.org/moshe-quot-bogie-quot-ya-alon'},
      {t:'Carnegie Council', u:'https://www.carnegiecouncil.org/people/moshe-yaalon'},
      {t:'The Washington Institute', u:'https://www.washingtoninstitute.org/experts/moshe-yaalon'}
    ]
  },
  'דן חלוץ': {
    bio: 'דן חלוץ (נולד בתל אביב, 1948) הוא הרמטכ"ל השמונה-עשר של צה"ל, והראשון שהגיע לתפקיד מחיל האוויר. הוא התגייס ב-1966 לקורס טיס והפך לטייס קרב; במלחמת יום הכיפורים הפיל שלושה מטוסי אויב בעשרות גיחות מבצעיות. בשנים 2000–2004 פיקד על חיל האוויר. כרמטכ"ל (2005–2007) עמד בראש צה"ל במלחמת לבנון השנייה (2006); לאחר המלחמה, על רקע הביקורת על התנהלותה, התפטר מתפקידו בינואר 2007 — הקצין הבכיר ביותר שהתפטר בעקבותיה.',
    sources: [
      {t:'Jewish Virtual Library', u:'https://jewishvirtuallibrary.org/dan-halutz'},
      {t:'The Jerusalem Post', u:'https://www.jpost.com/israel-news/defense-news/article-898201'},
      {t:'Ynetnews', u:'https://www.ynetnews.com/article/3353329'}
    ]
  },
  'גבי אשכנזי': {
    bio: 'גבי אשכנזי (נולד במושב חגור, 1954) הוא מצביא ומדינאי, הרמטכ"ל התשעה-עשר של צה"ל. הוא בן לאב ניצול שואה מבולגריה ולאם ילידת סוריה, התגייס ב-1972 לחטיבת גולני, לחם במלחמת יום הכיפורים והשתתף במבצע אנטבה. לאחר שפיקד על חטיבת גולני ועל פיקוד הצפון, וכיהן כמנכ"ל משרד הביטחון, מונה לרמטכ"ל בעקבות התפטרות חלוץ. בכהונתו (2007–2011) הוביל את שיקום צה"ל לאחר מלחמת לבנון השנייה ופיקד על מבצע "עופרת יצוקה" (2008–2009). לימים נכנס לפוליטיקה וכיהן כשר החוץ.',
    sources: [
      {t:'צה"ל — רמטכ"לים בעבר (idf.il)', u:'https://www.idf.il/en/mini-sites/past-chiefs-of-staff/lt-gen-gabi-ashkenazi-2007-2011/'},

      {t:'Ynetnews', u:'https://www.ynetnews.com/articles/0,7340,L-3362535,00.html'}
    ]
  },
  'בני גנץ': {
    bio: 'בני גנץ (נולד בכפר אחים, 1959) הוא מצביא ומדינאי, הרמטכ"ל העשרים של צה"ל. הוא בן לאם ניצולת שואה, התגייס ב-1977, ולאורך הקריירה פיקד בין השאר על יחידת שלדג, על חטיבת הצנחנים ועל פיקוד הצפון, ושימש סגן הרמטכ"ל ונספח צה"ל בארה"ב. כרמטכ"ל (2011–2015) הוביל את צה"ל בשלושה מבצעים בעזה — "עמוד ענן" (2012) ו"צוק איתן" (2014). לאחר שירותו נכנס לפוליטיקה, הקים את מפלגת "כחול לבן" (לימים "המחנה הממלכתי"), וכיהן כראש הממשלה החלופי וכשר הביטחון.',
    sources: [
      {t:'Encyclopaedia Britannica', u:'https://www.britannica.com/biography/Benny-Gantz'},

    ]
  },
  'גדי איזנקוט': {
    bio: 'גדי איזנקוט (נולד בטבריה למשפחה יוצאת מרוקו, 1960) הוא מצביא ומדינאי, הרמטכ"ל העשרים ואחד של צה"ל. הוא התגייס ב-1978 לחטיבת גולני ועלה בה בדרגות ובתפקידי פיקוד. כראש פיקוד הצפון ניסח את "תפיסת הדאחייה" בנוגע להפעלת כוח מול תשתיות האויב. כרמטכ"ל (2015–2019) פיקד בין השאר על מבצע "מגן צפוני" לחשיפת מנהרות חיזבאללה. לאחר פרישתו נכנס לפוליטיקה במסגרת "המחנה הממלכתי", וכיהן בתקופת המלחמה שלאחר 7 באוקטובר 2023 כחבר בקבינט המלחמה.',
    sources: [
      {t:'Jewish Virtual Library', u:'https://jewishvirtuallibrary.org/gadi-eisenkot'},

      {t:'The Washington Institute', u:'https://www.washingtoninstitute.org/experts/gadi-eisenkot'}
    ]
  },
  'אביב כוכבי': {
    bio: 'אביב כוכבי (נולד ב-1964) הוא הרמטכ"ל העשרים ושניים של צה"ל. הוא שירת בחטיבת הצנחנים, פיקד עליה ועל עוצבות ופיקודים, וכיהן כראש אגף המודיעין וכסגן הרמטכ"ל. כרמטכ"ל (2019 עד ינואר 2023) שם דגש על הגברת הקטלניות, השימוש במודיעין ותפיסת "ההכרעה", בתקופה של אתגרים בגבולות עזה ולבנון ומול איראן. לאחר אירועי 7 באוקטובר 2023 הביע נכונות שהחלטותיו בתקופת כהונתו ייבדקו במסגרת תחקירי הכישלון.',

/* ===================== HELPERS ===================== */
function ageAt(birth, date){
  let a = date.getFullYear() - birth.getFullYear();
  const m = date.getMonth() - birth.getMonth();
  if (m < 0 || (m === 0 && date.getDate() < birth.getDate())) a--;
  return a;
}

function formatTerm(start, end){
  const s = new Date(start + 'T00:00:00');
  const sStr = months[s.getMonth()] + ' ' + s.getFullYear();
  if (!end) return sStr + ' – היום';
  const e = new Date(end + 'T00:00:00');
  return sStr + ' – ' + months[e.getMonth()] + ' ' + e.getFullYear();
}

function ageText(birth, start, end){
  const today = new Date();
  const startD = new Date(start + 'T00:00:00');
  const endD = end ? new Date(end + 'T00:00:00') : today;
  let aEnd = ageAt(birth, endD);
  if (aEnd < 0) aEnd = 0;
  if (startD <= birth){
    return aEnd > 0 ? ('מלידתך ועד גיל ' + aEnd) : 'בשנת חייך הראשונה';
  }
  let aStart = ageAt(birth, startD);
  if (aStart < 0) aStart = 0;
  if (aStart === aEnd) return 'בערך בגיל ' + aStart;
  return 'מגיל ' + aStart + ' עד ' + aEnd;
}

function initials(name){
  return name.split(/[\s-]+/).slice(0,2).map(w => w.charAt(0)).join(' ');
}

function el(tag, cls, html){
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html != null) e.innerHTML = html;
  return e;
}

// אחוז מחיי המשתמש שבו האיש כיהן בתפקידו (חפיפת הכהונה עם הטווח לידה→היום)
function lifePercent(birth, today, start, end){
  const s = new Date(start + 'T00:00:00').getTime();
  const e = (end ? new Date(end + 'T00:00:00') : today).getTime();
  const oStart = Math.max(birth.getTime(), s);
  const oEnd = Math.min(today.getTime(), e);
  const overlap = Math.max(0, oEnd - oStart);
  const life = today.getTime() - birth.getTime();
  return life > 0 ? (overlap / life) * 100 : 0;
}

function fmtPct(p){
  if (p > 0 && p < 0.1) return '<0.1%';
  let s = p.toFixed(1);
  if (s.endsWith('.0')) s = s.slice(0, -2);
  return s + '%';
}

function statTile(num, lbl){
  return '<div class="stat"><div class="num">' + num + '</div><div class="lbl">' + lbl + '</div></div>';
}

/* ===================== RENDER ===================== */
function buildCard(item, birth, today, ordinalText){
  const card = el('li', 'card' + (item.end === null ? ' live' : ''));

  const avatar = el('div', 'avatar');
  avatar.setAttribute('data-initials', initials(item.name));
  const img = document.createElement('img');
  img.loading = 'lazy';
  img.alt = item.name;
  img.src = item.img;
  img.onerror = function(){ this.remove(); };
  avatar.appendChild(img);

  const info = el('div', 'info');
  const name = el('div', 'name');
  name.appendChild(document.createTextNode(item.name));
  if (item.end === null) name.appendChild(el('span', 'badge-live', item.gender === 'f' ? 'מכהנת כיום' : 'מכהן כיום'));
  info.appendChild(name);

  const metaText = ordinalText || item.party || '';
  if (metaText) info.appendChild(el('div', 'meta accent', metaText));
  info.appendChild(el('div', 'term', formatTerm(item.start, item.end)));
  info.appendChild(el('div', 'age', ageText(birth, item.start, item.end)));

  const pct = lifePercent(birth, today, item.start, item.end);
  const pctWrap = el('div', 'pct');
  const bar = el('div', 'pct-bar');
  const span = document.createElement('span');
  span.style.width = Math.min(100, pct).toFixed(1) + '%';
  bar.appendChild(span);
  pctWrap.appendChild(bar);
  pctWrap.appendChild(el('div', 'pct-label', '<b>' + fmtPct(pct) + '</b> מחייך'));
  info.appendChild(pctWrap);

  card.appendChild(avatar);
  card.appendChild(info);
  card.appendChild(el('div', 'go', '‹'));

  card.tabIndex = 0;
  card.setAttribute('role', 'button');
  card.setAttribute('aria-label', 'פרטים על ' + item.name);
  const open = () => openModal(item, metaText, birth, today);
  card.addEventListener('click', open);
  card.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' '){ e.preventDefault(); open(); }
  });
  return card;
}

function buildBlock(key, birthStr, birth, today){
  const block = DATA[key];
  const items = block.list
    .map((it, i) => Object.assign({ ord: i + 1 }, it))
    .filter(it => it.end === null || it.end >= birthStr)
    .sort((a, b) => a.start < b.start ? -1 : 1);

  if (items.length === 0) return { node: null, items: [] };

  const section = el('section', 'block ' + key);
  section.setAttribute('data-key', key);
  const head = el('div', 'block-head');
  head.appendChild(el('span', 'ic', block.icon));
  head.appendChild(el('h2', null, block.title));
  head.appendChild(el('span', 'count', items.length + (items.length === 1 ? ' כהונה' : ' כהונות')));
  section.appendChild(head);

  const ul = el('ul', 'timeline');
  items.forEach((it, idx) => {
    const ord = block.ordinal ? (block.singular + ' ה-' + it.ord) : null;
    const c = buildCard(it, birth, today, ord);
    c.style.setProperty('--ci', idx);
    ul.appendChild(c);
  });
  section.appendChild(ul);
  return { node: section, items: items };
}

function filterCards(q){
  const section = document.querySelector('#results section.block:not(.hidden)');
  if (!section) return;
  q = q.toLowerCase();
  let vis = 0;
  section.querySelectorAll('.card').forEach(c => {
    const name = c.querySelector('.info .name')?.childNodes[0]?.textContent?.toLowerCase() || '';
    const show = !q || name.includes(q);
    c.style.display = show ? '' : 'none';
    if (show) vis++;
  });
  let emp = section.querySelector('.search-empty');
  if (!emp){ emp = document.createElement('p'); emp.className='search-empty'; section.appendChild(emp); }
  emp.textContent = vis===0 && q ? 'לא נמצאו תוצאות עבור "'+searchInput.value+'"' : '';
  emp.style.display = vis===0 && q ? '' : 'none';
}

    '<div class="stats">' +
      statTile(ageAt(birth, today), 'גיל') +
      statTile(blocks.pm.items.length, 'ראשי ממשלה') +
      statTile(blocks.cos.items.length, 'רמטכ"לים') +
      statTile(blocks.pres.items.length, 'נשיאים') +
    '</div>';
  summaryBox.classList.remove('hidden');

  // highlights box: longest-serving per category (sum of their terms within your life) + parliamentary stats
  function longestServing(items){
    const byName = {};
    items.forEach(it => { byName[it.name] = (byName[it.name] || 0) + lifePercent(birth, today, it.start, it.end); });
    let best = null;
    Object.keys(byName).forEach(n => { if (!best || byName[n] > best.pct) best = { name: n, pct: byName[n] }; });
    return best;
  }
  const hlRow = (ic, label, best) => best ?
    ('<div class="hl-row"><span class="hl-ic">' + ic + '</span>' +
     '<div class="hl-main"><div class="hl-label">' + label + '</div>' +
     '<div class="hl-name">' + best.name + '</div></div>' +
     '<span class="hl-pct">' + fmtPct(best.pct) + '</span></div>') : '';
  const knessetCount = elecCount + (val > ELECTIONS[0] ? 1 : 0);
  highlightsBox.innerHTML =
    '<h3>הסיכום שלך</h3>' +
    hlRow('🏛️', 'ראש הממשלה שכיהן הכי הרבה זמן מחייך', longestServing(blocks.pm.items)) +
    hlRow('🎖️', 'הרמטכ"ל שכיהן הכי הרבה זמן מחייך', longestServing(blocks.cos.items)) +
    hlRow('⭐', 'הנשיא שכיהן הכי הרבה זמן מחייך', longestServing(blocks.pres.items)) +
    '<div class="hl-stats">' +
      '<div class="hl-stat"><b>' + knessetCount + '</b>כנסות במהלך חייך</div>' +
      '<div class="hl-stat"><b>' + elecCount + '</b>מערכות בחירות במהלך חייך</div>' +
    '</div>';
  // share buttons
  const shareText = buildShareText(val, blocks);
  const shareRow = document.createElement('div');
  shareRow.className = 'share-row';
  const waBtn = document.createElement('button');
  waBtn.type='button'; waBtn.className='share-btn wa';
  waBtn.innerHTML='<svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 32 32" fill="white" style="flex-shrink:0"><path d="M16 0C7.164 0 0 7.163 0 16c0 2.824.738 5.476 2.031 7.775L0 32l8.418-2.004A15.93 15.93 0 0016 32c8.836 0 16-7.163 16-16S24.836 0 16 0zm0 29.333a13.27 13.27 0 01-6.784-1.856l-.486-.29-5.002 1.19 1.22-4.867-.317-.5A13.265 13.265 0 012.667 16C2.667 8.636 8.636 2.667 16 2.667S29.333 8.636 29.333 16 23.364 29.333 16 29.333zm7.28-9.878c-.4-.2-2.364-1.166-2.73-1.3-.367-.132-.634-.2-.9.2-.267.4-1.034 1.3-1.267 1.566-.233.267-.467.3-.867.1-.4-.2-1.687-.622-3.214-1.983-1.188-1.06-1.99-2.37-2.223-2.77-.233-.4-.025-.617.175-.817.18-.18.4-.467.6-.7.2-.233.267-.4.4-.667.133-.267.067-.5-.033-.7-.1-.2-.9-2.167-1.233-2.967-.325-.78-.655-.674-.9-.687l-.767-.013c-.267 0-.7.1-1.067.5s-1.4 1.367-1.4 3.333 1.433 3.867 1.633 4.133c.2.267 2.82 4.3 6.833 6.033.955.413 1.7.66 2.28.845.958.306 1.831.263 2.52.16.769-.115 2.364-.967 2.697-1.9.333-.933.333-1.733.233-1.9-.1-.167-.367-.267-.767-.467z"/></svg> שיתוף';
  waBtn.onclick = () => window.open('https://wa.me/?text='+encodeURIComponent(shareText),'_blank');
  const cpBtn = document.createElement('button');
  cpBtn.type='button'; cpBtn.className='share-btn cp';
  cpBtn.innerHTML='🔗 העתק קישור';
  const siteUrl = 'https://omrivizel-commits.github.io/My-leaders/';
  cpBtn.onclick = () => { navigator.clipboard.writeText(siteUrl).then(()=>{cpBtn.textContent='✅ הועתק!'; setTimeout(()=>cpBtn.innerHTML='🔗 העתק קישור',2000); }); };
  shareRow.appendChild(waBtn); shareRow.appendChild(cpBtn);
  highlightsBox.appendChild(shareRow);
  highlightsBox.classList.remove('hidden');

  // show compare toggle + search
  compareToggleBtn.classList.remove('hidden');
  comparePanel.classList.add('hidden');
  compareToggleBtn.textContent = '⚖️ השווה עם מישהו נוסף';
  compareResults.innerHTML = '';
  searchWrap.classList.remove('hidden');

  buildEvents(val);

  // founding note
  if (val < FOUNDING){
    noteBox.textContent = 'מדינת ישראל הוקמה ב-14 במאי 1948 — מוצגים כל המנהיגים מאז הקמתה.';
    noteBox.classList.remove('hidden');
  } else {
    noteBox.classList.add('hidden');
  }

  summaryBox.scrollIntoView({ behavior: 'smooth', block: 'start' });
});
</script>
</body>
</html>
